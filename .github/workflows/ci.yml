name: CI

on:
  pull_request:
  push:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          set -euo pipefail
          toolchain="$(sed -n 's/^channel = "\(.*\)"/\1/p' rust-toolchain.toml)"
          rustup toolchain install "$toolchain" --profile minimal --component rustfmt --component clippy
          rustup default "$toolchain"
          rustc --version
          cargo --version

      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-rust-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-rust-
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check workspace
        run: RUSTFLAGS='-D warnings' cargo check --workspace --all-targets

      - name: Check all features
        run: RUSTFLAGS='-D warnings' cargo check --workspace --all-targets --all-features

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run clippy with all features
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run workspace tests
        run: cargo test --workspace

  conformance:
    name: Simulator and vectors
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          set -euo pipefail
          toolchain="$(sed -n 's/^channel = "\(.*\)"/\1/p' rust-toolchain.toml)"
          rustup toolchain install "$toolchain" --profile minimal
          rustup default "$toolchain"
          rustc --version
          cargo --version

      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-conformance-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-conformance-
            ${{ runner.os }}-cargo-

      - name: Run simulator tests
        run: cargo test -p cgka-conformance-simulator

      - name: Run slow simulator tests
        run: cargo test -p cgka-conformance-simulator --features conformance-slow

      - name: Run vector report
        run: |
          cargo run -p cgka-conformance-simulator --bin cgka-conformance-simulator-report -- \
            --vectors crates/cgka-conformance-simulator/vectors \
            --out target/cgka-conformance-simulator-reports

      - name: Upload vector report
        uses: actions/upload-artifact@v4
        with:
          name: cgka-conformance-simulator-reports
          path: target/cgka-conformance-simulator-reports
          if-no-files-found: error

  formal:
    name: Tamarin proofs
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Tamarin dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends graphviz maude

      - name: Install Tamarin
        env:
          TAMARIN_VERSION: 1.12.0
        run: |
          set -euo pipefail
          curl -L --fail --show-error --silent \
            "https://github.com/tamarin-prover/tamarin-prover/releases/download/${TAMARIN_VERSION}/tamarin-prover-${TAMARIN_VERSION}-linux64-ubuntu.tar.gz" \
            -o /tmp/tamarin-prover.tar.gz
          tar -xzf /tmp/tamarin-prover.tar.gz -C /tmp
          sudo install -m 0755 /tmp/tamarin-prover /usr/local/bin/tamarin-prover
          tamarin-prover --version

      - name: Run Tamarin proofs
        run: make -C formal/tamarin prove
