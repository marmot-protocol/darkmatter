name: CI

on:
  pull_request:
  push:
    branches:
      - master
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE_TEST_DEBUG: "0"

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      formal: ${{ steps.filter.outputs.formal }}
      conformance: ${{ steps.filter.outputs.conformance }}
      relay: ${{ steps.filter.outputs.relay }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Compute path filters
        id: filter
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "Non-PR event (${{ github.event_name }}); running all heavy jobs"
            echo "formal=true" >> "$GITHUB_OUTPUT"
            echo "conformance=true" >> "$GITHUB_OUTPUT"
            echo "relay=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          if ! git cat-file -e "$base" 2>/dev/null; then
            git fetch --no-tags --depth=50 origin "$base" || true
          fi
          files="$(git diff --name-only "$base" "$head" 2>/dev/null || git diff --name-only "$base"...HEAD)"
          echo "Changed files:"
          echo "$files"

          formal=false
          conformance=false
          relay=false
          # Infra/config-only PRs (workflow, composite actions, nextest config)
          # must still exercise the heavy gates so CI changes are validated end-to-end.
          if echo "$files" | grep -qE '^(\.github/workflows/|\.github/actions/|\.config/nextest\.toml)'; then
            formal=true
            conformance=true
            relay=true
          fi
          if echo "$files" | grep -qE '^(formal/|spec/|rust-toolchain\.toml)'; then
            formal=true
          fi
          if echo "$files" | grep -qE '^(crates/cgka-engine/|crates/cgka-conformance-simulator/|crates/cgka-session/|crates/traits/|crates/storage-sqlite/|spec/|Cargo\.lock|Cargo\.toml|rust-toolchain\.toml)'; then
            conformance=true
          fi
          if echo "$files" | grep -qE '^(crates/cli/|crates/marmot-app/|crates/marmot-account/|crates/transport-nostr-|crates/transport-quic-|crates/storage-sqlite/|crates/cgka-session/|docker-compose|scripts/wait_for_relays\.sh|Cargo\.lock|Cargo\.toml|rust-toolchain\.toml)'; then
            relay=true
          fi
          echo "formal=$formal"
          echo "conformance=$conformance"
          echo "relay=$relay"
          echo "formal=$formal" >> "$GITHUB_OUTPUT"
          echo "conformance=$conformance" >> "$GITHUB_OUTPUT"
          echo "relay=$relay" >> "$GITHUB_OUTPUT"

  rust-format:
    name: Rust format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: ./.github/actions/setup-rust
        with:
          components: rustfmt
          cache: "false"

      - name: Check formatting
        run: cargo fmt --all --check

  rust-check:
    name: Rust check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: ./.github/actions/setup-rust

      - name: Check workspace (all features)
        run: RUSTFLAGS='-D warnings' cargo check --workspace --all-targets --all-features --locked

  rust-clippy:
    name: Rust clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: ./.github/actions/setup-rust
        with:
          components: clippy

      - name: Run clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  rust-test:
    name: Rust tests (${{ matrix.partition }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        partition: [1, 2, 3, 4]
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: ./.github/actions/setup-rust

      - name: Install cargo-nextest
        uses: taiki-e/install-action@b18fb392e1a1b90971f7c7572c92790fa54f23d5 # nextest

      - name: Run workspace tests
        run: |
          cargo nextest run \
            --workspace \
            --exclude cgka-conformance-simulator \
            --locked \
            --partition hash:${{ matrix.partition }}/4 \
            -E 'not (package(marmot-app) & binary(relay_runtime))'

      - name: Run doctests
        if: matrix.partition == 1
        run: cargo test --workspace --exclude cgka-conformance-simulator --doc --locked

  relay-runtime:
    name: Relay runtime tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: ./.github/actions/setup-rust

      - name: Install cargo-nextest
        uses: taiki-e/install-action@b18fb392e1a1b90971f7c7572c92790fa54f23d5 # nextest

      - name: Run relay runtime tests
        run: cargo nextest run -p marmot-app --test relay_runtime --locked

  relay-e2e:
    name: Relay CLI E2E
    needs: changes
    if: needs.changes.outputs.relay == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: ./.github/actions/setup-rust

      - name: Install cargo-nextest
        uses: taiki-e/install-action@b18fb392e1a1b90971f7c7572c92790fa54f23d5 # nextest

      - name: Start local relay stack
        run: docker compose up -d setup nostr-rs-relay strfry-nostr-relay

      - name: Wait for local relays
        run: |
          docker compose ps
          ./scripts/wait_for_relays.sh

      - name: Run real relay CLI E2E
        env:
          DARKMATTER_E2E_REQUIRE_RELAYS: "1"
        run: cargo nextest run -p darkmatter-cli --test cli_e2e --locked

      - name: Dump local relay logs
        if: failure()
        run: docker compose logs nostr-rs-relay strfry-nostr-relay || true

      - name: Stop local relay stack
        if: always()
        run: docker compose down -v

  conformance:
    name: Simulator and vectors
    needs: changes
    if: needs.changes.outputs.conformance == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: ./.github/actions/setup-rust

      - name: Install cargo-nextest
        uses: taiki-e/install-action@b18fb392e1a1b90971f7c7572c92790fa54f23d5 # nextest

      - name: Run simulator tests
        run: cargo nextest run -p cgka-conformance-simulator --locked

      - name: Run simulator doctests
        run: cargo test -p cgka-conformance-simulator --doc --locked

      - name: Run vector report
        run: |
          cargo run -p cgka-conformance-simulator --bin cgka-conformance-simulator-report --locked -- \
            --vectors crates/cgka-conformance-simulator/vectors \
            --out target/cgka-conformance-simulator-reports

      - name: Upload vector report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cgka-conformance-simulator-reports
          path: target/cgka-conformance-simulator-reports
          if-no-files-found: error

  formal:
    name: Tamarin proofs
    needs: changes
    if: needs.changes.outputs.formal == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Tamarin dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends graphviz maude

      - name: Install Tamarin
        env:
          TAMARIN_VERSION: 1.12.0
        run: |
          set -euo pipefail
          curl -L --fail --show-error --silent \
            "https://github.com/tamarin-prover/tamarin-prover/releases/download/${TAMARIN_VERSION}/tamarin-prover-${TAMARIN_VERSION}-linux64-ubuntu.tar.gz" \
            -o /tmp/tamarin-prover.tar.gz
          tar -xzf /tmp/tamarin-prover.tar.gz -C /tmp
          sudo install -m 0755 /tmp/tamarin-prover /usr/local/bin/tamarin-prover
          tamarin-prover --version

      - name: Run Tamarin proofs
        run: make -C formal/tamarin prove

  ci-pass:
    name: CI pass
    if: always()
    needs:
      - rust-format
      - rust-check
      - rust-clippy
      - rust-test
      - relay-runtime
      - relay-e2e
      - conformance
      - formal
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Verify required jobs
        env:
          R_FORMAT: ${{ needs.rust-format.result }}
          R_CHECK: ${{ needs.rust-check.result }}
          R_CLIPPY: ${{ needs.rust-clippy.result }}
          R_TEST: ${{ needs.rust-test.result }}
          R_RELAY_RT: ${{ needs.relay-runtime.result }}
          R_RELAY_E2E: ${{ needs.relay-e2e.result }}
          R_CONFORMANCE: ${{ needs.conformance.result }}
          R_FORMAL: ${{ needs.formal.result }}
        run: |
          set -euo pipefail
          fail=0
          required_always=(R_FORMAT R_CHECK R_CLIPPY R_TEST R_RELAY_RT)
          conditionally_required=(R_RELAY_E2E R_CONFORMANCE R_FORMAL)
          for var in "${required_always[@]}"; do
            value="${!var}"
            if [[ "$value" != "success" ]]; then
              echo "::error::Required job $var = $value"
              fail=1
            fi
          done
          for var in "${conditionally_required[@]}"; do
            value="${!var}"
            if [[ "$value" != "success" && "$value" != "skipped" ]]; then
              echo "::error::Conditionally required job $var = $value"
              fail=1
            fi
          done
          if [[ "$fail" -ne 0 ]]; then
            exit 1
          fi
          echo "All required CI jobs passed (skipped jobs were path-conditional)."
