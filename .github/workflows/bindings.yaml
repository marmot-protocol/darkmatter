name: MarmotKit Bindings

# Builds the Swift (iOS) and Kotlin (Android) MarmotKit bindings on every push to
# master and publishes a single GitHub Release named after the commit:
#   marmotkit-<YYYY.MM.DD>-<short-sha>   (e.g. marmotkit-2026.06.18-81d172f)
#
# This repo only publishes assets — it hosts no Package.swift. The release carries a
# bare MarmotKit.xcframework.zip, its `swift package compute-checksum` value, the
# generated MarmotKit.swift, and the Kotlin bundle. The host app (whitenoise-ios) owns
# its own Package.swift and points a binaryTarget(url:checksum:) at these assets.
# The release tag is created on the existing master commit, so the workflow never
# writes to master and cannot re-trigger itself.
on:
  push:
    branches: [master, chore/release-swift-bindings]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: marmotkit-bindings-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE_RELEASE_DEBUG: "0"
  OTLP_EXPORT: "1"

jobs:
  meta:
    name: Derive release identity
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.id.outputs.version }}
      tag: ${{ steps.id.outputs.tag }}
      short_sha: ${{ steps.id.outputs.short_sha }}
    steps:
      - name: Compute version / tag from commit
        id: id
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA:0:7}"
          version="$(date +%Y.%m.%d)-$short_sha"
          tag="marmotkit-$version"
          {
            echo "short_sha=$short_sha"
            echo "version=$version"
            echo "tag=$tag"
          } >> "$GITHUB_OUTPUT"

  swift-bindings:
    name: Build Swift binding
    needs: meta
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          toolchain="$(sed -n 's/^channel = "\(.*\)"/\1/p' rust-toolchain.toml)"
          rustup toolchain install "$toolchain" --profile minimal
          rustup default "$toolchain"
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim
          rustc --version
          cargo --version

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build MarmotKit XCFramework
        run: ./crates/marmot-uniffi/xcframework.sh

      - name: Package Swift binding
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.meta.outputs.version }}"
          out="crates/marmot-uniffi/output"
          dist="$RUNNER_TEMP/dist"
          rm -rf "$dist"; mkdir -p "$dist"

          # Bare xcframework zip — xcframework at archive root, as SwiftPM's
          # binaryTarget(url:checksum:) requires.
          ( cd "$out" && zip -r "$dist/MarmotKit.xcframework.zip" MarmotKit.xcframework )

          # SwiftPM checksum (what binaryTarget `checksum:` expects) + a plain sha256.
          checksum="$(swift package compute-checksum "$dist/MarmotKit.xcframework.zip")"
          echo "$checksum" > "$dist/MarmotKit.xcframework.zip.checksum"
          shasum -a 256 "$dist/MarmotKit.xcframework.zip" \
            | awk '{print $1 "  MarmotKit.xcframework.zip"}' > "$dist/MarmotKit.xcframework.zip.sha256"

          # Generated Swift wrapper — committed into the package by the release job.
          cp "$out/MarmotKit.swift" "$dist/MarmotKit.swift"

          workspace_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          cat > "$dist/manifest.json" <<EOF
          {
            "name": "marmotkit-swift",
            "version": "$version",
            "tag": "${{ needs.meta.outputs.tag }}",
            "source_sha": "$GITHUB_SHA",
            "swiftpm_checksum": "$checksum",
            "workspace_version": "$workspace_version",
            "rustc": "$(rustc --version)",
            "cargo": "$(cargo --version)"
          }
          EOF

      - name: Upload Swift artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: marmotkit-swift
          path: ${{ runner.temp }}/dist/*
          if-no-files-found: error

  kotlin-bindings:
    name: Build Kotlin binding
    needs: meta
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          toolchain="$(sed -n 's/^channel = "\(.*\)"/\1/p' rust-toolchain.toml)"
          rustup toolchain install "$toolchain" --profile minimal
          rustup default "$toolchain"
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            i686-linux-android \
            x86_64-linux-android
          rustc --version
          cargo --version

      - name: Install Android NDK
        shell: bash
        env:
          ANDROID_NDK_VERSION: 27.2.12479018
        run: |
          set -euo pipefail
          sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [[ -z "$sdk_root" ]]; then
            echo "error: ANDROID_SDK_ROOT or ANDROID_HOME must be set on the runner" >&2
            exit 1
          fi
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail
          sdkmanager "ndk;$ANDROID_NDK_VERSION"
          echo "ANDROID_NDK_HOME=$sdk_root/ndk/$ANDROID_NDK_VERSION" >> "$GITHUB_ENV"

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build MarmotKit Kotlin and JNI bindings
        run: ./crates/marmot-uniffi/kotlin-bindings.sh

      - name: Package Kotlin binding
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.meta.outputs.version }}"
          stage_parent="$RUNNER_TEMP/marmotkit-kotlin-stage"
          bundle_dir="$stage_parent/marmotkit-kotlin-$version"
          asset="$RUNNER_TEMP/marmotkit-kotlin-$version.zip"
          workspace_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"

          rm -rf "$stage_parent" "$asset" "$asset.sha256"
          mkdir -p "$bundle_dir"
          cp -R crates/marmot-uniffi/output/android/kotlin "$bundle_dir/"
          cp -R crates/marmot-uniffi/output/android/jniLibs "$bundle_dir/"

          cat > "$bundle_dir/manifest.json" <<EOF
          {
            "name": "marmotkit-kotlin",
            "version": "$version",
            "tag": "${{ needs.meta.outputs.tag }}",
            "source_sha": "$GITHUB_SHA",
            "workspace_version": "$workspace_version",
            "android_ndk_home": "${ANDROID_NDK_HOME:-}",
            "rustc": "$(rustc --version)",
            "cargo": "$(cargo --version)"
          }
          EOF

          ( cd "$stage_parent" && zip -r "$asset" "marmotkit-kotlin-$version" )
          shasum -a 256 "$asset" \
            | awk -v name="$(basename "$asset")" '{print $1 "  " name}' > "$asset.sha256"
          mkdir -p dist
          cp "$asset" "$asset.sha256" dist/

      - name: Upload Kotlin artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: marmotkit-kotlin
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs:
      - meta
      - swift-bindings
      - kotlin-bindings
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download Swift artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: marmotkit-swift
          path: artifacts/swift

      - name: Download Kotlin artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: marmotkit-kotlin
          path: artifacts/kotlin

      - name: Create release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ needs.meta.outputs.tag }}"
          version="${{ needs.meta.outputs.version }}"
          checksum="$(cat artifacts/swift/MarmotKit.xcframework.zip.checksum)"

          # The tag is created on the existing master commit ($GITHUB_SHA) by the
          # release itself — no new commit, no push to master. Tag creation does not
          # match the `branches:` trigger, so this cannot re-trigger the workflow.
          notes="$RUNNER_TEMP/notes.md"
          cat > "$notes" <<EOF
          MarmotKit bindings built from \`$GITHUB_SHA\`.

          Swift (consumed via a binaryTarget in the host app's own Package.swift):
          - \`MarmotKit.xcframework.zip\` — SwiftPM checksum \`$checksum\`
          - \`MarmotKit.swift\` — generated UniFFI wrapper (commit alongside the host app)

          Kotlin:
          - \`marmotkit-kotlin-$version.zip\` (generated Kotlin + Android JNI)

          Verify downloads with the accompanying \`.sha256\` files.
          EOF

          assets=(
            "artifacts/swift/MarmotKit.xcframework.zip"
            "artifacts/swift/MarmotKit.xcframework.zip.sha256"
            "artifacts/swift/MarmotKit.xcframework.zip.checksum"
            "artifacts/swift/MarmotKit.swift"
            "artifacts/swift/manifest.json"
            artifacts/kotlin/marmotkit-kotlin-*.zip
            artifacts/kotlin/marmotkit-kotlin-*.zip.sha256
          )

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$tag" --repo "$GITHUB_REPOSITORY" \
              --title "MarmotKit $version" --notes-file "$notes"
          else
            gh release create "$tag" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "MarmotKit $version" \
              --notes-file "$notes"
          fi
